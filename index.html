 return `<span><b>${m.symbol}</b> <span class="${col}">${c.label||'–'} ${c.score==null?'':((c.score>=0?'+':'')+c.score)}</span></span>`;
}).join('   ·   ') || 'TradingView sidecar 未連線';

// 執行步進
const ST=['SCAN','DETECT','RISK','SIZE','FILL','SETTLE'];
const on=Math.floor(Date.now()/3000)%ST.length;
document.getElementById('steps').innerHTML=ST.map((s,i)=>
 `<div class="step ${i===on?'on':''}"><div class="n">0${i+1}</div><div class="s">${s}</div></div>`).join('');

// 權益曲線
const es=DATA.equity_series;
new Chart(document.getElementById('eqChart'),{type:'line',
 data:{labels:es.map(p=>p.t),datasets:[{data:es.map(p=>p.v),borderColor:'#0f8a78',borderWidth:1.8,
  fill:true,backgroundColor:'#0f8a7820',tension:.2,pointRadius:0}]},
 options:{plugins:{legend:{display:false}},scales:{
  x:{ticks:{color:'#6f6857',maxTicksLimit:5,font:{size:9}},grid:{color:'#00000010'}},
  y:{ticks:{color:'#6f6857',font:{size:9}},grid:{color:'#00000010'}}}}});

// 每筆盈虧
const tp=DATA.trade_pnls;
new Chart(document.getElementById('pnlChart'),{type:'bar',
 data:{labels:tp.map(p=>p.symbol),datasets:[{data:tp.map(p=>p.pnl),
  backgroundColor:tp.map(p=>p.pnl>=0?'#1f8a4c':'#c5362f'),borderRadius:2}]},
 options:{plugins:{legend:{display:false}},scales:{
  x:{ticks:{color:'#6f6857',font:{size:9}},grid:{display:false}},
  y:{ticks:{color:'#6f6857',font:{size:9}},grid:{color:'#00000010'}}}}});

// 技術評級矩陣
function heat(s){if(s==null)return['#e6e1d3','#9a937f'];
 if(s>=0.5)return['#1f8a4c','#ffffff']; if(s>=0.15)return['#a9d39a','#1d3a1d'];
 if(s<=-0.5)return['#c5362f','#ffffff']; if(s<=-0.15)return['#e2aba4','#4a1410'];
 return['#e7d9a8','#5a4a12'];}
const mx=DATA.matrix||[];
document.getElementById('matrix').innerHTML = mx.length? (
 `<table class="mtx"><tr><th class="sym">資產</th>`+DATA.tfs.map(t=>`<th>${t}</th>`).join('')+`</tr>`+
 mx.map(m=>`<tr><td class="sym">${m.symbol}</td>`+m.cells.map(c=>{const h=heat(c.score);
   return `<td><div class="cell" style="background:${h[0]};color:${h[1]}">${c.score==null?'–':((c.score>=0?'+':'')+c.score)}</div></td>`;}).join('')+`</tr>`).join('')
 +`</table>`) : '<div class="empty">需啟動 TradingView sidecar 才有技術評級</div>';

// 持倉
const pos=DATA.open_positions;
document.getElementById('positions').innerHTML = pos.length? (
 `<table class="tb"><tr><th>標的</th><th>方向</th><th>數量</th><th>進場</th><th>標記</th><th>槓桿</th><th>未實現</th></tr>`+
 pos.map(p=>`<tr><td><b>${p.symbol}</b></td>
   <td class="side-${(p.side||'').toLowerCase()}">${(p.side||'').toUpperCase()||'–'}</td>
   <td>${f(p.contracts,4)}</td><td>${f(p.entry)}</td><td>${f(p.mark)}</td>
   <td>${p.leverage||'–'}x</td>
   <td class="${cls(p.upnl)}">${p.upnl==null||p.upnl===''?'–':((p.upnl>=0?'+':'')+f(p.upnl))}</td></tr>`).join('')
 +`</table>`) : '<div class="empty">目前無持倉</div>';

// 交易紀錄
const ev=DATA.events;
document.getElementById('events').innerHTML = ev.length? (
 `<table class="tb"><tr><th>時間</th><th>動作</th><th>標的</th><th>方向</th><th>槓桿</th><th>盈虧</th><th>原因 / Claude 理由</th></tr>`+
 ev.map(e=>`<tr><td>${e.t}</td>
   <td><span class="tag ${e.kind==='開倉'?'t-open':'t-close'}">${e.kind}</span></td>
   <td><b>${e.symbol}</b></td>
   <td class="side-${(e.side||'').toLowerCase()}">${(e.side||'').toUpperCase()||'–'}</td>
   <td>${e.lev?e.lev+'x':'–'}</td>
   <td class="${e.pnl==null?'':cls(e.pnl)}">${e.pnl==null?'–':((e.pnl>=0?'+':'')+f(e.pnl))}</td>
   <td class="why">${e.reason?('<span class=rsn>['+e.reason+']</span> '):''}${(e.why||'').slice(0,180)}</td></tr>`).join('')
 +`</table>`) : '<div class="empty">本次 run 尚無交易</div>';
</script></body></html>
